<section class="theme theme--white">
  <div class="container">
    <div class="preference">
      <button class="btn btn--previous" routerLink="/recipe-generator" type="button">
        <img class="btn__icon" src="assets/img/arrow_left.svg" />
        <p class="btn__text btn__text--previous">Ingredients</p>
      </button>
      <h1 class="preference__title">Choose your preferences</h1>
      <div class="preference__form">
        <div class="preference__how-many">
          <div class="preference__portions">
            <span>How many portions you need?</span>
            <div class="preference__counter">
              <button (click)="decrease('portions')" type="button" class="btn btn--minus">
                <svg
                  class="btn__icon"
                  width="28"
                  height="28"
                  viewBox="0 0 28 28"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    d="M9.55556 15.1111H18.4444C18.7593 15.1111 19.0231 15.0046 19.2361 14.7917C19.4491 14.5787 19.5556 14.3148 19.5556 14C19.5556 13.6852 19.4491 13.4213 19.2361 13.2083C19.0231 12.9954 18.7593 12.8889 18.4444 12.8889H9.55556C9.24074 12.8889 8.97685 12.9954 8.76389 13.2083C8.55093 13.4213 8.44444 13.6852 8.44444 14C8.44444 14.3148 8.55093 14.5787 8.76389 14.7917C8.97685 15.0046 9.24074 15.1111 9.55556 15.1111ZM6.22222 24C5.61111 24 5.08796 23.7824 4.65278 23.3472C4.21759 22.912 4 22.3889 4 21.7778V6.22222C4 5.61111 4.21759 5.08796 4.65278 4.65278C5.08796 4.21759 5.61111 4 6.22222 4H21.7778C22.3889 4 22.912 4.21759 23.3472 4.65278C23.7824 5.08796 24 5.61111 24 6.22222V21.7778C24 22.3889 23.7824 22.912 23.3472 23.3472C22.912 23.7824 22.3889 24 21.7778 24H6.22222ZM6.22222 21.7778H21.7778V6.22222H6.22222V21.7778Z"
                    fill="#10310B"
                  />
                </svg>
              </button>
              <div class="preference__value">
                <span class="preference__number">{{ portions }}</span> Portion{{
                  portions > 1 ? 's' : ''
                }}
              </div>
              <button (click)="increase('portions')" type="button" class="btn btn--plus">
                <svg
                  class="btn__icon"
                  width="28"
                  height="28"
                  viewBox="0 0 28 28"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    d="M12.3333 15.6667V17.8889C12.3333 18.3519 12.4954 18.7454 12.8194 19.0694C13.1435 19.3935 13.537 19.5556 14 19.5556C14.463 19.5556 14.8565 19.3935 15.1806 19.0694C15.5046 18.7454 15.6667 18.3519 15.6667 17.8889V15.6667H17.8889C18.3519 15.6667 18.7454 15.5046 19.0694 15.1806C19.3935 14.8565 19.5556 14.463 19.5556 14C19.5556 13.537 19.3935 13.1435 19.0694 12.8194C18.7454 12.4954 18.3519 12.3333 17.8889 12.3333H15.6667V10.1111C15.6667 9.64815 15.5046 9.25463 15.1806 8.93056C14.8565 8.60648 14.463 8.44444 14 8.44444C13.537 8.44444 13.1435 8.60648 12.8194 8.93056C12.4954 9.25463 12.3333 9.64815 12.3333 10.1111V12.3333H10.1111C9.64815 12.3333 9.25463 12.4954 8.93056 12.8194C8.60648 13.1435 8.44444 13.537 8.44444 14C8.44444 14.463 8.60648 14.8565 8.93056 15.1806C9.25463 15.5046 9.64815 15.6667 10.1111 15.6667H12.3333ZM6.22222 24C5.61111 24 5.08796 23.7824 4.65278 23.3472C4.21759 22.912 4 22.3889 4 21.7778V6.22222C4 5.61111 4.21759 5.08796 4.65278 4.65278C5.08796 4.21759 5.61111 4 6.22222 4H21.7778C22.3889 4 22.912 4.21759 23.3472 4.65278C23.7824 5.08796 24 5.61111 24 6.22222V21.7778C24 22.3889 23.7824 22.912 23.3472 23.3472C22.912 23.7824 22.3889 24 21.7778 24H6.22222ZM6.22222 21.7778H21.7778V6.22222H6.22222V21.7778Z"
                    fill="#10310B"
                  />
                </svg>
              </button>
            </div>
          </div>
          <div class="preference__chef">
            <span>How many are cooking?</span>
            <div class="preference__counter">
              <button (click)="decrease('chefs')" type="button" class="btn btn--minus">
                <svg
                  class="btn__icon"
                  width="28"
                  height="28"
                  viewBox="0 0 28 28"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    d="M9.55556 15.1111H18.4444C18.7593 15.1111 19.0231 15.0046 19.2361 14.7917C19.4491 14.5787 19.5556 14.3148 19.5556 14C19.5556 13.6852 19.4491 13.4213 19.2361 13.2083C19.0231 12.9954 18.7593 12.8889 18.4444 12.8889H9.55556C9.24074 12.8889 8.97685 12.9954 8.76389 13.2083C8.55093 13.4213 8.44444 13.6852 8.44444 14C8.44444 14.3148 8.55093 14.5787 8.76389 14.7917C8.97685 15.0046 9.24074 15.1111 9.55556 15.1111ZM6.22222 24C5.61111 24 5.08796 23.7824 4.65278 23.3472C4.21759 22.912 4 22.3889 4 21.7778V6.22222C4 5.61111 4.21759 5.08796 4.65278 4.65278C5.08796 4.21759 5.61111 4 6.22222 4H21.7778C22.3889 4 22.912 4.21759 23.3472 4.65278C23.7824 5.08796 24 5.61111 24 6.22222V21.7778C24 22.3889 23.7824 22.912 23.3472 23.3472C22.912 23.7824 22.3889 24 21.7778 24H6.22222ZM6.22222 21.7778H21.7778V6.22222H6.22222V21.7778Z"
                    fill="#10310B"
                  />
                </svg>
              </button>
              <div class="preference__value">
                <span class="preference__number">{{ chefs }} </span> Person{{
                  chefs > 1 ? 's' : ''
                }}
              </div>
              <button
                (click)="increase('chefs')"
                type="button"
                class="btn btn--plus"
                [disabled]="chefs === 4"
              >
                <svg
                  class="btn__icon"
                  width="28"
                  height="28"
                  viewBox="0 0 28 28"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    d="M12.3333 15.6667V17.8889C12.3333 18.3519 12.4954 18.7454 12.8194 19.0694C13.1435 19.3935 13.537 19.5556 14 19.5556C14.463 19.5556 14.8565 19.3935 15.1806 19.0694C15.5046 18.7454 15.6667 18.3519 15.6667 17.8889V15.6667H17.8889C18.3519 15.6667 18.7454 15.5046 19.0694 15.1806C19.3935 14.8565 19.5556 14.463 19.5556 14C19.5556 13.537 19.3935 13.1435 19.0694 12.8194C18.7454 12.4954 18.3519 12.3333 17.8889 12.3333H15.6667V10.1111C15.6667 9.64815 15.5046 9.25463 15.1806 8.93056C14.8565 8.60648 14.463 8.44444 14 8.44444C13.537 8.44444 13.1435 8.60648 12.8194 8.93056C12.4954 9.25463 12.3333 9.64815 12.3333 10.1111V12.3333H10.1111C9.64815 12.3333 9.25463 12.4954 8.93056 12.8194C8.60648 13.1435 8.44444 13.537 8.44444 14C8.44444 14.463 8.60648 14.8565 8.93056 15.1806C9.25463 15.5046 9.64815 15.6667 10.1111 15.6667H12.3333ZM6.22222 24C5.61111 24 5.08796 23.7824 4.65278 23.3472C4.21759 22.912 4 22.3889 4 21.7778V6.22222C4 5.61111 4.21759 5.08796 4.65278 4.65278C5.08796 4.21759 5.61111 4 6.22222 4H21.7778C22.3889 4 22.912 4.21759 23.3472 4.65278C23.7824 5.08796 24 5.61111 24 6.22222V21.7778C24 22.3889 23.7824 22.912 23.3472 23.3472C22.912 23.7824 22.3889 24 21.7778 24H6.22222ZM6.22222 21.7778H21.7778V6.22222H6.22222V21.7778Z"
                    fill="#10310B"
                  />
                </svg>
              </button>
            </div>
          </div>
        </div>
        <div class="preference__settings">
          <div class="preference__time">
            <span class="preference__span">
              <img src="assets/img/clock.svg" alt="clock" />Cooking time</span
            >
            <div class="preference__options">
              <div class="preference__option-wrapper">
                <label>
                  <input type="radio" name="time" value="quick" [(ngModel)]="time" />
                  <span class="preference__option"> Quick </span>
                </label>
                <small>ab to 20min</small>
              </div>
              <div class="preference__option-wrapper">
                <label>
                  <input type="radio" name="time" value="medium" [(ngModel)]="time" />
                  <span class="preference__option"> Medium </span>
                </label>
                <small>25-40min</small>
              </div>
              <div class="preference__option-wrapper">
                <label>
                  <input type="radio" name="time" value="complex" [(ngModel)]="time" />
                  <span class="preference__option"> Complex </span>
                </label>
                <small>over 45min</small>
              </div>
            </div>
          </div>
          <div class="preference__cuisine">
            <span class="preference__span">
              <img src="assets/img/public.svg" alt="clock" />Cuisine</span
            >
            <div class="preference__options">
                <div class="preference__option-wrapper">
                  <label>
                    <input type="radio" name="cuisine" value="german" [(ngModel)]="cuisine" />
                    <span class="preference__option"> German </span>
                  </label>
                </div>
              <div class="preference__option-wrapper">
                <label>
                  <input type="radio" name="cuisine" value="italian" [(ngModel)]="cuisine" />
                  <span class="preference__option"> Italian </span>
                </label>
              </div>
              <div class="preference__option-wrapper">
                <label>
                  <input type="radio" name="cuisine" value="indian" [(ngModel)]="cuisine" />
                  <span class="preference__option"> Indian </span>
                </label>
              </div>
              <div class="preference__option-wrapper">
                <label>
                  <input type="radio" name="cuisine" value="japanese" [(ngModel)]="cuisine" />
                  <span class="preference__option"> Japanese </span>
                </label>
              </div>
              <div class="preference__option-wrapper">
                <label>
                  <input type="radio" name="cuisine" value="gourmet" [(ngModel)]="cuisine" />
                  <span class="preference__option"> Gourmet </span>
                </label>
              </div>
              <div class="preference__option-wrapper">
                <label>
                  <input type="radio" name="cuisine" value="fusion" [(ngModel)]="cuisine" />
                  <span class="preference__option"> Fusion </span>
                </label>
              </div>

            </div>
          </div>
          <div class="preference__diet">
            <span class="preference__span">
              <img src="assets/img/fork_spoon.svg" alt="clock" />Diet preferences</span
            >
            <div class="preference__options">
               <div class="preference__option-wrapper">
                <label>
                  <input type="radio" name="diet" value="vegeterian" [(ngModel)]="diet" />
                  <span class="preference__option"> Vegeterian </span>
                </label>
              </div>
              <div class="preference__option-wrapper">
                <label>
                  <input type="radio" name="diet" value="vegan" [(ngModel)]="diet" />
                  <span class="preference__option"> Vegan </span>
                </label>
              </div>
              <div class="preference__option-wrapper">
                <label>
                  <input type="radio" name="diet" value="keto" [(ngModel)]="diet" />
                  <span class="preference__option"> Keto </span>
                </label>
              </div>
              <div class="preference__option-wrapper">
                <label>
                  <input type="radio" name="diet" value="none" [(ngModel)]="diet" />
                  <span class="preference__option"> No preferences </span>
                </label>
              </div>
            </div>
          </div>
        </div>
        <button class="btn btn--generate" [disabled]="!isValid()" (click)="generateRecipe()">Generate a recipe</button>
      </div>
    </div>
  </div>
</section>
