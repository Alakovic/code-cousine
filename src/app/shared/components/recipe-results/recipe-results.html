<section class="theme">
  <div class="container">
    <div class="results">
      @if (isLoading()) {
        <div class="results__loading">
          <img src="/assets/img/spinner/Code_Cuisine_Loading_Spinner.gif" alt="loading" />
          <p>Cooking your recipe...</p>
        </div>
      } @else {
        <div class="results__content">
          <h1>Your recipe is finished</h1>
        </div>
      }
    </div>
  </div>
</section>
